version: "3.9"
services:
  db:
    image: postgres:16
    container_name: radar_proventos_db
    environment:
      POSTGRES_DB: radar_proventos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
